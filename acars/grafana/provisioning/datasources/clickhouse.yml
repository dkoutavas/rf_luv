apiVersion: 1

datasources:
  - name: ClickHouse
    uid: P_ACARS_CLICKHOUSE
    type: grafana-clickhouse-datasource
    access: proxy
    isDefault: true
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      defaultDatabase: acars
      username: acars
    secureJsonData:
      password: acars_local
    editable: true
