# Spectrum Scanner Pipeline
# scanner.py (rtl_tcp FFT) → scan_ingest.py (JSON→ClickHouse) → Grafana
#
# Usage:
#   docker compose up -d
#   open http://localhost:3003 for Grafana dashboards
#
# RTL-SDR must be streaming via rtl_tcp on the host:
#   Linux:    rtl_tcp -a 0.0.0.0 -p 1234 -s 2048000
#   Windows:  rtl_tcp.exe -a 0.0.0.0 -p 1234 -s 2048000
#
# See README.md for USB/driver setup per platform.
#
# Sweeps 88-470 MHz with 100 kHz bins every ~5 minutes.
# Detects anomalies, identifies known signals, builds baseline.
#
# NOTE: only one pipeline can use rtl_tcp at a time.
# Stop other pipelines first.

services:

  # ─── Scanner + Ingest (opt-in profile) ─────────────────
  # scanner.py connects to rtl_tcp on the host, computes FFT power
  # spectrum, pipes JSON to scan_ingest.py which batch-inserts to
  # ClickHouse. Gated behind `profiles: ["scanner"]` so plain
  # `docker compose up -d` brings up only the storage/dashboard stack
  # — useful on hosts that run the scanner natively as a systemd
  # service (e.g. leap), and avoids fighting them for the rtl_tcp
  # single-client connection.
  #
  # Quick start (Docker, all-in-one): `docker compose --profile scanner up -d`
  # Production (systemd watchdog stack): see ../ops/rtl-tcp/install.sh
  spectrum-scanner:
    profiles: ["scanner"]
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: spectrum-scanner
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    # Compose auto-loads spectrum/.env (if present) for ${VAR} substitution.
    # See spectrum/.env.example for documented overrides.
    environment:
      RTL_TCP_HOST: "${RTL_TCP_HOST:-host.docker.internal}"
      RTL_TCP_PORT: "${RTL_TCP_PORT:-1234}"
      SCAN_FREQ_START: "${SCAN_FREQ_START:-88000000}"
      SCAN_FREQ_END: "${SCAN_FREQ_END:-470000000}"
      SCAN_BIN_WIDTH: "${SCAN_BIN_WIDTH:-100000}"
      SCAN_GAIN: "${SCAN_GAIN:-12}"
      SCAN_GAIN_MIN: "${SCAN_GAIN_MIN:-2}"
      SCAN_FFT_SIZE: "${SCAN_FFT_SIZE:-1024}"
      SCAN_SAMPLE_RATE: "${SCAN_SAMPLE_RATE:-2048000}"
      SCAN_INTERVAL_SECONDS: "${SCAN_INTERVAL_SECONDS:-280}"
      SCAN_AIRBAND_INTERVAL: "${SCAN_AIRBAND_INTERVAL:-60}"
      SCAN_PEAK_THRESHOLD: "${SCAN_PEAK_THRESHOLD:-10}"
      SCAN_TRANSIENT_THRESHOLD: "${SCAN_TRANSIENT_THRESHOLD:-15}"
      SCAN_DVBT_EXCLUDE_START: "${SCAN_DVBT_EXCLUDE_START:-174000000}"
      SCAN_DVBT_EXCLUDE_END: "${SCAN_DVBT_EXCLUDE_END:-230000000}"
      SCAN_DONGLE_ID: "${SCAN_DONGLE_ID:-v3-01}"
      SCAN_ANTENNA_POSITION: "${SCAN_ANTENNA_POSITION:-}"
      SCAN_ANTENNA_ARMS_CM: "${SCAN_ANTENNA_ARMS_CM:-}"
      SCAN_ANTENNA_ORIENTATION: "${SCAN_ANTENNA_ORIENTATION:-}"
      SCAN_ANTENNA_HEIGHT_M: "${SCAN_ANTENNA_HEIGHT_M:-}"
      SCAN_NOTES: "${SCAN_NOTES:-}"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: spectrum
      CLICKHOUSE_USER: spectrum
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-spectrum_local}"
      BATCH_SIZE: "${BATCH_SIZE:-500}"
      FLUSH_INTERVAL_SECONDS: "${FLUSH_INTERVAL_SECONDS:-5}"
    # Maps host.docker.internal to host IP. Works on Linux Docker 20.10+ and WSL/Docker Desktop.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── ClickHouse (Time Series Storage) ──────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse-spectrum
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: spectrum
      CLICKHOUSE_USER: spectrum
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-spectrum_local}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8126:8123"
      - "9003:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./clickhouse/cors.xml:/etc/clickhouse-server/config.d/cors.xml:ro
    healthcheck:
      # busybox wget in the ClickHouse image resolves localhost to something
      # ClickHouse isn't bound to (connection refused observed on leap even
      # though HTTP from other containers works). clickhouse-client sidesteps
      # the HTTP resolution path and matches upstream ops docs.
      test: ["CMD", "clickhouse-client", "--user", "${CLICKHOUSE_USER:-spectrum}", "--password", "${CLICKHOUSE_PASSWORD:-spectrum_local}", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ─── Grafana (Dashboards) ──────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana-spectrum
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD:-admin}"
      GF_INSTALL_PLUGINS: "grafana-clickhouse-datasource"
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
    ports:
      - "3003:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Signal Logger (static form) ────────────────────
  # Serves the listening log HTML form for the Playbook dashboard.
  # Grafana's text panel strips <script> tags, so the form
  # runs standalone and is embedded via iframe.
  logging-form:
    image: nginx:1.27-alpine
    container_name: logging-form
    restart: unless-stopped
    ports:
      - "8084:80"
    volumes:
      - ./logging/index.html:/usr/share/nginx/html/index.html:ro

volumes:
  clickhouse-data:
  grafana-data:
